<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">

    <link href="src/css/index.css" rel="stylesheet">
    <link href="src/css/main.css" rel="stylesheet">
    <link href="src/css/mobile.css" rel="stylesheet">
    <link href="src/css/themes.css" rel="stylesheet">
    <link rel="shortcut icon" type="image/png" href="src/img/favicon.png" />
    <title data-i18n="login.title">ReVoiceChat - Login</title>
</head>

<body>
    <div class="main login">
        <div class="login-box">
            <!-- Login form-->
            <form id="login-form" class="login-form">
                <h1>ReVoiceChat</h1>
                <div class="login-element">
                    <label for="login-host" data-i18n="login.host">Host</label>
                    <input type="text" name="host" id="login-host">
                </div>
                <div class="login-element">
                    <label for="username" data-i18n="login.username">Username</label>
                    <input type="text" name="username" id="username">
                </div>
                <div class="login-element">
                    <div style="display: flex; justify-content: space-between;">
                      <label for="password" data-i18n="login.password">Password</label>
                      <button id="forget-password-button" style="width: auto; margin: 0;" type="button" class='switch' data-i18n="login.register.forgot.password">Forget password</button>
                    </div>
                    <input type="password" name="password" id="password">
                </div>
                <button id="login-button" type="button" data-i18n="login.login">Login</button>
                <button id="switch-to-register-button" type="button" class='switch' data-i18n="login.register.go.to.page">Register instead ?</button>
            </form>

            <!-- Register form-->
            <form id="register-form" class="login-form hidden">
                <h1>ReVoiceChat</h1>
                <div class="login-element">
                    <label for="register-host" data-i18n="login.host">Host</label>
                    <input type="text" name="host" id="register-host">
                </div>
                <div class="login-element" id="register-invitation-div">
                    <label for="register-invitation" data-i18n="login.invitation">Invitation code</label>
                    <input type="text" name="invitation" id="register-invitation" placeholder="Required for this host">
                </div>
                <div class="login-element">
                    <label for="register-username" data-i18n="login.username">Username</label>
                    <input type="text" name="username" id="register-username">
                </div>
                <div class="login-element">
                    <label for="register-password" data-i18n="login.password">Password</label>
                    <input type="password" name="password" id="register-password" title="At least 8 characters with 1 capital and 1 special character">
                </div>
                <div class="login-element">
                    <label for="register-password-confirm" data-i18n="login.password.confirm">Confirm password</label>
                    <input type="password" name="passwordConfirm" id="register-password-confirm" title="At least 8 characters with 1 capital and 1 special character">
                </div>
                <button type="button" id="user-register-button" data-i18n="login.register" disabled>Register</button>
                <button type="button" id="switch-to-login-button" class='switch' data-i18n="login.login.go.to.page">Login instead ?</button>
            </form>

            <form id="forgot-password-form" class="login-form hidden">
              <h1><revoice-icon-key></revoice-icon-key><span data-i18n="login.recovery.code.title">Forgot password</span></h1>
                <div class="login-element">
                    <label for="forgot-password-host" data-i18n="login.host">Host</label>
                    <input type="text" name="host" id="forgot-password-host">
                </div>
                <div class="login-element">
                    <label for="forgot-password-username" data-i18n="login.username">Username</label>
                    <input type="text" name="username" id="forgot-password-username">
                </div>
                <div class="login-element">
                    <label for="recovery-code" data-i18n="login.recovery.code">Recovery Code</label>
                    <input type="password" name="recovery-code" id="recovery-code">
                </div>
                <button id="forgot-password-button" type="button" data-i18n="login.recovery.code.button">Verify & continue →</button>
                <p class="login-info" data-i18n="login.recovery.code.infos">Your recovery code was shown once when you registered.</p>
                <button id="back-to-login-button" type="button" class='switch' data-i18n="login.back.to.login">← back to login</button>
          </form>

          <form id="reset-password-form" class="login-form hidden">
            <h1><revoice-icon-lock></revoice-icon-lock><span data-i18n="login.reset.password.title">Reset password</span></h1>
              <div class="login-element">
                  <label for="reset-password" data-i18n="login.new.password">New Password</label>
                  <input type="password" name="password" id="reset-password" title="At least 8 characters with 1 capital and 1 special character">
              </div>
              <div class="login-element">
                  <label for="reset-password-confirm" data-i18n="login.password.confirm">Confirm password</label>
                  <input type="password" name="passwordConfirm" id="reset-password-confirm" title="At least 8 characters with 1 capital and 1 special character">
              </div>
              <button id="reset-password-button" type="button" data-i18n="reset.password.button">Reset password</button>
              <p class="login-info" data-i18n="reset.password.infos">At least 8 characters, one uppercase and one special character.</p>
          </form>
        </div>
    </div>

    <script src="src/js/index.js" type="module"></script>
</body>

</html>
